<!DOCTYPE html>
<html>
<head>
<title>Dino Run Game</title>
<style>
    body {
        margin: 0;
        background: #eee;
        font-family: Arial;
        text-align: center;
    }

    h1 {
        color: #333;
    }

    #game {
        width: 800px;
        height: 250px;
        background: white;
        border: 2px solid black;
        margin: auto;
        position: relative;
        overflow: hidden;
    }

    #dino {
        width: 40px;
        height: 50px;
        background: green;
        position: absolute;
        bottom: 0;
        left: 50px;
    }

    #cactus {
        width: 25px;
        height: 50px;
        background: red;
        position: absolute;
        bottom: 0;
        right: 0;
    }

    #score {
        font-size: 25px;
        margin: 10px;
    }

    .jump {
        animation: jump 0.6s;
    }

    @keyframes jump {
        0% { bottom: 0; }
        50% { bottom: 100px; }
        100% { bottom: 0; }
    }
</style>
</head>

<body>

<h1>🦖 Dino Run</h1>
<div id="score">Score: 0</div>

<div id="game">
    <div id="dino"></div>
    <div id="cactus"></div>
</div>

<h3>Press SPACE to Jump</h3>

<script>

const dino = document.getElementById("dino");
const cactus = document.getElementById("cactus");
const scoreText = document.getElementById("score");

let score = 0;
let gameOver = false;


// Jump function
document.addEventListener("keydown", function(event){
    if(event.code === "Space"){
        jump();
    }
});


function jump(){
    if(!dino.classList.contains("jump")){
        dino.classList.add("jump");

        setTimeout(()=>{
            dino.classList.remove("jump");
        },600);
    }
}


// Move cactus
let cactusPosition = 0;

function moveCactus(){

    if(gameOver) return;

    cactusPosition += 5;

    cactus.style.right = cactusPosition + "px";


    if(cactusPosition > 800){
        cactusPosition = 0;
        score++;
        scoreText.innerHTML = "Score: " + score;
    }


    // Collision
    let dinoBottom = parseInt(
        window.getComputedStyle(dino).bottom
    );

    if(
        cactusPosition > 700 &&
        dinoBottom < 50
    ){
        gameOver = true;
        alert("Game Over! Score: " + score);
        location.reload();
    }

    requestAnimationFrame(moveCactus);
}


moveCactus();

</script>

</body>
</html>
