<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#1e293b;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    color:white;
    margin-bottom:20px;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:10px;
    justify-content:center;
}

.cell{
    width:100px;
    height:100px;
    background:white;
    border-radius:10px;
    font-size:40px;
    font-weight:bold;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:.2s;
}

.cell:hover{
    background:#e2e8f0;
}

.status{
    margin:20px;
    color:white;
    font-size:22px;
}

button{
    margin-top:20px;
    padding:12px 28px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}
</style>

</head>
<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<div class="status" id="status">
Player X's Turn
</div>

<div class="board" id="board">
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
</div>

<!-- New Game Button Down -->
<button id="newGame">New Game</button>

</div>

<script>
const cells=document.querySelectorAll(".cell");
const status=document.getElementById("status");
const newGame=document.getElementById("newGame");

let currentPlayer="X";
let gameActive=true;
let board=["","","","","","","","",""];

const wins=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

cells.forEach((cell,index)=>{
    cell.addEventListener("click",()=>play(index));
});

function play(index){

    if(board[index]!=="" || !gameActive)
        return;

    board[index]=currentPlayer;
    cells[index].textContent=currentPlayer;

    if(checkWinner()){
        status.textContent=`Player ${currentPlayer} Wins!`;
        gameActive=false;
        return;
    }

    if(board.every(cell=>cell!="")){
        status.textContent="It's a Draw!";
        gameActive=false;
        return;
    }

    currentPlayer=currentPlayer==="X"?"O":"X";
    status.textContent=`Player ${currentPlayer}'s Turn`;
}

function checkWinner(){

    return wins.some(pattern=>{
        const[a,b,c]=pattern;
        return board[a] &&
               board[a]===board[b] &&
               board[a]===board[c];
    });

}

newGame.addEventListener("click",resetGame);

function resetGame(){

    board=["","","","","","","","",""];
    currentPlayer="X";
    gameActive=true;

    cells.forEach(cell=>cell.textContent="");

    status.textContent="Player X's Turn";
}
</script>

</body>
</html>
