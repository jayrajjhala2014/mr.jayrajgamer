<!DOCTYPE html>
<html>
<head>
<title>Space Shooter Game</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}

#game {
    width: 600px;
    height: 500px;
    background: #111;
    border: 3px solid white;
    margin: auto;
    position: relative;
    overflow: hidden;
}

#player {
    width: 50px;
    height: 50px;
    background: cyan;
    position: absolute;
    bottom: 20px;
    left: 275px;
    border-radius: 10px;
}

.bullet {
    width: 6px;
    height: 15px;
    background: yellow;
    position: absolute;
}

.enemy {
    width: 40px;
    height: 40px;
    background: red;
    position: absolute;
    top: 0;
    border-radius: 50%;
}

#score {
    font-size: 25px;
    margin: 15px;
}
</style>

</head>

<body>

<h1>🚀 Space Shooter</h1>

<div id="score">
Score: 0
</div>

<div id="game">

<div id="player"></div>

</div>


<p>
Move: ⬅️ ➡️ &nbsp; Shoot: SPACE
</p>


<script>

let game = document.getElementById("game");
let player = document.getElementById("player");
let scoreText = document.getElementById("score");

let playerX = 275;
let score = 0;


// Player movement

document.addEventListener("keydown", function(e){

    if(e.key === "ArrowLeft"){
        playerX -= 20;
    }

    if(e.key === "ArrowRight"){
        playerX += 20;
    }

    if(playerX < 0)
        playerX = 0;

    if(playerX > 550)
        playerX = 550;


    player.style.left = playerX + "px";


    if(e.code === "Space"){
        shoot();
    }

});



// Create bullet

function shoot(){

    let bullet = document.createElement("div");

    bullet.className = "bullet";

    bullet.style.left = playerX + 22 + "px";
    bullet.style.bottom = "70px";

    game.appendChild(bullet);


    let move = setInterval(()=>{

        bullet.style.bottom =
        (parseInt(bullet.style.bottom) + 10) + "px";


        if(parseInt(bullet.style.bottom) > 500){

            bullet.remove();
            clearInterval(move);

        }


        checkHit(bullet);


    },30);

}



// Create enemies

function createEnemy(){

    let enemy = document.createElement("div");

    enemy.className = "enemy";

    enemy.style.left =
    Math.random()*560 + "px";

    game.appendChild(enemy);



    let y = 0;

    let fall = setInterval(()=>{

        y += 3;

        enemy.style.top = y + "px";


        if(y > 500){

            enemy.remove();
            clearInterval(fall);

        }


    },30);

}


setInterval(createEnemy,1000);



// Collision

function checkHit(bullet){

    let enemies =
    document.querySelectorAll(".enemy");


    enemies.forEach(enemy=>{

        let b =
        bullet.getBoundingClientRect();

        let e =
        enemy.getBoundingClientRect();


        if(
            b.left < e.right &&
            b.right > e.left &&
            b.top < e.bottom &&
            b.bottom > e.top
        ){

            enemy.remove();
            bullet.remove();

            score++;

            scoreText.innerHTML =
            "Score: " + score;

        }

    });

}

</script>

</body>
</html>
